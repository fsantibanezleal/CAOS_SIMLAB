name: Deploy web to GitHub Pages

# Builds the static SPA in web/ (Vite) and publishes it to GitHub Pages on the custom domain
# simlab.fasl-work.com. Pure static viewer — no backend. The `prebuild` step (copy-data.mjs) overlays the
# committed simulation traces + manifests into the build, so committing a new trace re-publishes the site.

on:
  push:
    branches: [main]
    paths:
      - "web/**"
      - "data/artifacts/**"
      - "manifests/**"
      - "simlab/**"            # copy-data.mjs inlines simlab/**/*.py into the live Pyodide bundle, so engine
                               # edits change what runs in the browser even without a trace change → redeploy
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npm run build
      # SPA deep-link fallback (Pages serves 404.html for unknown paths).
      - run: cp dist/index.html dist/404.html
      - uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
