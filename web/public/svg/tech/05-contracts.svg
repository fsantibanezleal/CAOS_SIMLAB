<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 452" width="880" class="arch-svg" role="img" aria-label="CAOS_SIMLAB data contracts: the manifest schema, the trace schema, the 4-gate classifier and git-as-data">
  <style>
    .arch-svg text { font-family: Inter, "Segoe UI", system-ui, sans-serif; }
    .arch-svg .mono { font-family: ui-monospace, Consolas, monospace; }
    .arch-svg .bx { fill: var(--color-surface-2); stroke: var(--color-border); stroke-width: 1.2; }
    .arch-svg .bx-hi { stroke: var(--color-accent); }
    .arch-svg .bx-web { stroke: var(--color-good); }
    .arch-svg .bx-eng { stroke: var(--color-warn); }
    .arch-svg .in { fill: var(--color-surface); stroke: var(--color-border); stroke-width: 1; }
    .arch-svg .ttl { fill: var(--color-fg); font-size: 12.5px; font-weight: 600; }
    .arch-svg .sub { fill: var(--color-fg-subtle); font-size: 10px; }
    .arch-svg .it { fill: var(--color-fg); font-size: 10.5px; }
    .arch-svg .cd { fill: var(--color-accent); font-size: 9.5px; }
    .arch-svg .mu { fill: var(--color-fg-subtle); font-size: 9.5px; }
    .arch-svg .good { fill: var(--color-good); font-size: 10.5px; font-weight: 600; }
    .arch-svg .flow { fill: none; stroke: var(--color-fg-subtle); stroke-width: 1.5; }
    .arch-svg .lbl { fill: var(--color-fg-subtle); font-size: 9px; }
  </style>
  <defs>
    <marker id="ct-ar" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L8,4 L0,8 z" fill="var(--color-fg-subtle)"/>
    </marker>
  </defs>

  <text class="lane-ttl" x="14" y="26" style="fill: var(--color-accent); font-size:11.5px; font-weight:700; letter-spacing:.04em;">TWO COMMITTED ARTIFACTS DEFINE EVERY SCENARIO</text>

  <!-- MANIFEST -->
  <rect class="bx bx-hi" x="14" y="40" width="420" height="248" rx="10"/>
  <text class="ttl" x="28" y="62">Manifest</text>
  <text class="cd mono" x="92" y="62">manifests/&lt;id&gt;.json</text>
  <text class="sub" x="28" y="78">the scenario's contract + the lane verdict</text>
  <rect class="in" x="28" y="88" width="392" height="32" rx="6"/>
  <text class="it" x="38" y="108">id · engine · lane <tspan class="mu">(live | precomputed)</tspan></text>
  <rect class="in" x="28" y="126" width="392" height="44" rx="6"/>
  <text class="cd mono" x="38" y="144">gate { pure_python, run_ms, trace_bytes, reasons }</text>
  <text class="mu" x="38" y="160">the measured verdict, per variant</text>
  <rect class="in" x="28" y="176" width="392" height="32" rx="6"/>
  <text class="it" x="38" y="196">param_specs[] <tspan class="mu">— drive the UI sliders</tspan></text>
  <rect class="in" x="28" y="214" width="392" height="58" rx="6"/>
  <text class="it" x="38" y="233">variants[] (≥10 regimes)</text>
  <text class="cd mono" x="38" y="251">{ params, kpis, gate, trace → }</text>
  <text class="mu" x="38" y="266">a family to compare side by side</text>

  <!-- TRACE -->
  <rect class="bx bx-web" x="454" y="40" width="412" height="248" rx="10"/>
  <text class="ttl" x="468" y="62">Trace</text>
  <text class="cd mono" x="520" y="62">data/artifacts/&lt;id&gt;/&lt;v&gt;-seed42.json</text>
  <text class="sub" x="468" y="78">the rendered run — the source of truth</text>
  <rect class="in" x="468" y="88" width="384" height="48" rx="6"/>
  <text class="it" x="478" y="107">events / frames — the animatable timeline</text>
  <text class="cd mono" x="478" y="125">tr.add_event(t, kind, id=…)</text>
  <rect class="in" x="468" y="142" width="384" height="44" rx="6"/>
  <text class="it" x="478" y="161">kpis — what the HUD &amp; table read</text>
  <text class="mu" x="478" y="177">e.g. Wq, segregation S, makespan, CI half-width</text>
  <text class="mu" x="468" y="212">byte-stable: identical (params, seed) ⇒ identical trace.</text>
  <text class="good" x="468" y="236">live &amp; precompute render through ONE path.</text>

  <!-- gate -->
  <rect class="bx bx-eng" x="14" y="306" width="420" height="92" rx="10"/>
  <text class="ttl" x="28" y="328">classify_lane — the 4-gate AND</text>
  <text class="cd mono" x="28" y="346">simlab/core/scenario.py</text>
  <text class="it" x="28" y="366">pure-Python · wheels ⊆ LIVE_WHEELS</text>
  <text class="it" x="28" y="384">· run_ms ≤ 3000 · trace_bytes ≤ 1 MB</text>

  <!-- git-as-data -->
  <rect class="bx bx-hi" x="454" y="306" width="412" height="92" rx="10"/>
  <text class="ttl" x="468" y="328">git-as-data — no runtime database</text>
  <text class="it" x="468" y="349">the git history IS the data layer;</text>
  <text class="it" x="468" y="368">committing a new trace re-publishes the site.</text>
  <text class="mu" x="468" y="387">static GitHub Pages · zero backend</text>

  <!-- flow: variant.trace -> Trace -->
  <path class="flow" d="M422,243 C440,243 440,150 452,150" marker-end="url(#ct-ar)"/>
  <text class="lbl" x="430" y="196">trace →</text>

  <text class="mu" x="14" y="424">A reader can regenerate every number from the committed seed; the gate guarantees a scenario can never silently mislabel its lane.</text>
</svg>
